<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Box Model Lab</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background-color: lightgray;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: darkblue;
        }

        .box1 {
            width: 300px;
            padding: 20px;
            border: 5px solid blue;
            margin: 20px;
            background-color: white;
        }

        .box2 {
            width: 300px;
            padding: 30px;
            border: 10px dashed red;
            margin: 40px;
            background-color: lightyellow;
            box-sizing: border-box;
        }

        .box3 {
            width: 300px;
            height: 100px;
            overflow: scroll;
            border: 3px solid green;
            padding: 15px;
            background-color: white;
        }

    </style>

</head>

<body>

    <h1>CSS Box Model Lab</h1>

    <div class="box1">
        This box demonstrates padding, border, and margin properties.
    </div>

    <div class="box2">
        This box uses the border-box value for box-sizing.
    </div>

    <div class="box3">
        This box demonstrates overflow behavior. Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.
    </div>

</body>
</html>
