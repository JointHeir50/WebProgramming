<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Button</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: lightblue;
        }

        button {
            padding: 15px 25px;
            font-size: 18px;
            background-color: darkblue;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        button:hover {
            background-color: navy;
        }

        #message {
            margin-top: 20px;
            font-size: 24px;
            color: darkgreen;
        }

    </style>
</head>

<body>

    <h1>JavaScript Interaction Lab</h1>

    <button onclick="showMessage()">
        Click Me
    </button>

    <p id="message"></p>

    <script>

        function showMessage() {
            document.getElementById("message").innerHTML =
                "Hello! You clicked the button!";
        }

    </script>

</body>

</html>
