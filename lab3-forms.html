<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Order Form</title>
</head>
<body>

    <h1>Coffee Order Form</h1>


    <form action="https://www.w3schools.com/action_page.php" method="get">

    <label for="customerName">Customer Name:</label><br>
    <input type="text" id="customerName" name="customerName"><br><br>

    <label for="email">Email Address:</label><br>
    <input type="email" id="email" name="email"><br><br>
<label for="coffeeType">Select Coffee Type:</label><br>

<select id="coffeeType" name="coffeeType">
    <option value="espresso">Espresso</option>
    <option value="latte">Latte</option>
    <option value="cappuccino">Cappuccino</option>
    <option value="americano">Americano</option>
</select><br><br>

<l<label>Select Size:</label><br>

<input type="radio" id="small" name="size" value="small">


<input type="radio" id="medium" name="size" value="medium">
<label for="medium">Medium</label><br>

<input type="radio" id="large" name="size" value="large">
<label for="large">Large</label><br><br>

<label>Extras:</label><br>

<input type="checkbox" id="whippedCream" name="extras" value="Whipped Cream">
<label for="whippedCream">Whipped Cream</label><br>

<input type="checkbox" id="extraShot" name="extras" value="Extra Shot">
<label for="extraShot">Extra Shot</label><br>

<input type="checkbox" id="almondMilk" name="extras" value="Almond Milk">
<label for="almondMilk">Almond Milk</label><br><br>

<label for="instructions">Special Instructions:</label><br>

<textarea id="instructions" name="instructions" rows="4" cols="40"></textarea><br><br>

<input type="submit" value="Submit Order">
</form>
</body>
</html>
